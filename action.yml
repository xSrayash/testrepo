name: 'Run TryNarrative Tests'
description: 'Trigger AI QA tests securely via GitHub App'

inputs:
  github-token:
    description: 'Default GITHUB_TOKEN'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Dispatch to Narrative App
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        echo "🚀 Pinging TryNarrative via native GitHub Webhook..."
        
        gh api repos/${{ github.repository }}/dispatches \
          -f event_type="trynarrative_trigger" \
          -F client_payload[trigger_source]="${{ github.event_name }}" \
          -F client_payload[branch]="${{ github.ref_name }}" \
          -F client_payload[commit]="${{ github.sha }}" \
          -F client_payload[pr_number]="${{ github.event.pull_request.number || '' }}"
          
        echo "✅ Webhook fired! TryNarrative App will run your tests."
      shell: bash
