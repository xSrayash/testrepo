name: TryNarrative QA
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "*/5 * * * *"

jobs:
  run-tests:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Trigger AI Tests
        uses: Srayash/testaction@TEst
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}